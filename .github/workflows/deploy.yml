name: Deploy to Server Vultr

on:
  push:
    branches:
      - main2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60m
          command_timeout: 60m
          script: |
            set -e

            cd ~/myapps/django-utilities
            git fetch origin main
            git reset --hard origin/main

            export DOCKER_BUILDKIT=1

            echo "--- Building Docker images (cached) ---"
            docker-compose -f .docker/docker-compose.yml up -d --build

            echo "--- Waiting for Django container to be ready ---"
            timeout=60
            count=0
            while ! docker-compose ps | grep "web" | grep -q "Up"; do
                sleep 2
                count=$((count + 2))
                if [ $count -ge $timeout ]; then
                    echo "Web container failed to start in time. Logs:"
                    docker-compose logs web
                    exit 1
                fi
            done
            echo "Web container is up"

            echo "--- Running Post-Deployment Cleanup ---"
            docker image prune -f
            docker container prune -f
            docker volume prune -f 

            echo "--- Deployment Complete ---"
